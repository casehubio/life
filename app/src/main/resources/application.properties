# casehub-life application configuration
# Domain migrations: V100+ (casehub-work occupies V1-V21+; ledger base V1000-V1007)
# Flyway locations when full stack active:
#   classpath:db/migration,classpath:db/ledger/migration,classpath:db/qhorus/migration
# See: PLATFORM.md §flyway-version-range-allocation, PP-20260524-10efef
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:life;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

quarkus.hibernate-orm.schema-management.strategy=none
